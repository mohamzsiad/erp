version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: clouderp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: erpadmin
      POSTGRES_PASSWORD: erppassword
      POSTGRES_DB: clouderp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erpadmin -d clouderp"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: clouderp_redis
    restart: unless-stopped
    command: redis-server --requirepass redispassword --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redispassword", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
