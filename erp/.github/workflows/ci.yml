name: CI — Type-check, Test, Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_call:   # Allow other workflows to call this as a job

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ── 1. Install & cache dependencies ─────────────────────────────────────────
  install:
    name: Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install workspace dependencies
        run: npm ci --workspaces --if-present

      - name: Cache node_modules
        uses: actions/cache/save@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

  # ── 2. TypeScript type-check ─────────────────────────────────────────────────
  typecheck:
    name: TypeScript Type-check
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - name: Generate Prisma client
        working-directory: packages/backend
        run: npx prisma generate

      - name: Type-check backend
        working-directory: packages/backend
        run: npx tsc --noEmit

      - name: Type-check frontend
        working-directory: packages/frontend
        run: npx tsc --noEmit

  # ── 3. Backend tests ──────────────────────────────────────────────────────────
  test-backend:
    name: Backend Tests (Jest)
    runs-on: ubuntu-latest
    needs: install

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: erpadmin
          POSTGRES_PASSWORD: testpass123
          POSTGRES_DB: clouderp_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql://erpadmin:testpass123@localhost:5432/clouderp_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: testsecretatleast32characterslong!!
      JWT_REFRESH_SECRET: testrefreshsecretat32characterslong
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - name: Generate Prisma client
        working-directory: packages/backend
        run: npx prisma generate

      - name: Run DB migrations
        working-directory: packages/backend
        run: npx prisma migrate deploy

      - name: Run Jest tests
        working-directory: packages/backend
        run: npm test -- --coverage --coverageReporters=lcov --forceExit
        timeout-minutes: 10

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: packages/backend/coverage/lcov.info
          flags: backend
        if: always()

  # ── 4. Frontend build ─────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend (Vite)
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - name: Build frontend
        working-directory: packages/frontend
        run: npm run build
        env:
          VITE_API_URL: /api/v1

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: packages/frontend/dist/
          retention-days: 7

  # ── Summary gate ──────────────────────────────────────────────────────────────
  ci-success:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [typecheck, test-backend, build-frontend]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.typecheck.result }}" != "success" || \
                "${{ needs.test-backend.result }}" != "success" || \
                "${{ needs.build-frontend.result }}" != "success" ]]; then
            echo "One or more CI checks failed"
            exit 1
          fi
          echo "All CI checks passed ✓"
