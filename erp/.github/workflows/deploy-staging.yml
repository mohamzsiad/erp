name: Deploy — Staging → Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-staging
  cancel-in-progress: false   # Never cancel in-flight deployments

env:
  NODE_VERSION: '20'
  AZURE_RG: rg-clouderp-staging
  ENV_SUFFIX: stg001

jobs:
  # ── Run CI first ──────────────────────────────────────────────────────────────
  ci:
    name: CI Checks
    uses: ./.github/workflows/ci.yml

  # ── Build & push Docker image ─────────────────────────────────────────────────
  build-image:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: ci
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      short-sha: ${{ steps.vars.outputs.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Set variables
        id: vars
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get ACR login server
        id: acr
        run: |
          SERVER=$(az acr show -n ${{ secrets.ACR_NAME }} --query loginServer -o tsv)
          echo "server=$SERVER" >> $GITHUB_OUTPUT

      - name: Log in to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.acr.outputs.server }}/clouderp-backend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=staging
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_SHA=${{ steps.vars.outputs.sha }}

  # ── Run DB migrations on staging ─────────────────────────────────────────────
  migrate-staging:
    name: Run DB Migrations (Staging)
    runs-on: ubuntu-latest
    needs: build-image
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install backend deps
        working-directory: packages/backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: packages/backend
        run: npx prisma generate

      - name: Run migrations
        working-directory: packages/backend
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

  # ── Deploy to App Service staging slot ───────────────────────────────────────
  deploy-staging-slot:
    name: Deploy to Staging Slot
    runs-on: ubuntu-latest
    needs: [build-image, migrate-staging]
    environment: staging
    outputs:
      staging-url: ${{ steps.deploy.outputs.webapp-url }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to staging slot
        id: deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.APP_SERVICE_NAME }}
          slot-name: staging
          images: ${{ secrets.ACR_LOGIN_SERVER }}/clouderp-backend:sha-${{ needs.build-image.outputs.short-sha }}

      - name: Wait for staging slot health
        run: |
          STAGING_URL="https://${{ secrets.APP_SERVICE_NAME }}-staging.azurewebsites.net"
          echo "Waiting for $STAGING_URL/api/v1/health ..."
          for i in {1..30}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$STAGING_URL/api/v1/health" || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Staging slot is healthy ✓"
              exit 0
            fi
            sleep 10
          done
          echo "Staging slot did not become healthy in time"
          exit 1

  # ── Smoke tests ───────────────────────────────────────────────────────────────
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy-staging-slot

    steps:
      - uses: actions/checkout@v4

      - name: Health check
        run: |
          URL="https://${{ secrets.APP_SERVICE_NAME }}-staging.azurewebsites.net"
          RESP=$(curl -sf "$URL/api/v1/health")
          STATUS=$(echo "$RESP" | jq -r '.status')
          echo "Health status: $STATUS"
          echo "Response: $RESP"
          if [ "$STATUS" != "ok" ] && [ "$STATUS" != "degraded" ]; then
            echo "Health check failed: $STATUS"
            exit 1
          fi

      - name: Auth endpoint check
        run: |
          URL="https://${{ secrets.APP_SERVICE_NAME }}-staging.azurewebsites.net"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "$URL/api/v1/auth/login" \
            -H "Content-Type: application/json" \
            -d '{"email":"invalid@test.com","password":"wrongpassword"}')
          echo "Auth endpoint returned: $HTTP_CODE"
          # Expect 401 (unauthorized) — confirms endpoint is reachable and routing works
          if [ "$HTTP_CODE" != "401" ] && [ "$HTTP_CODE" != "400" ]; then
            echo "Unexpected auth endpoint response: $HTTP_CODE"
            exit 1
          fi
          echo "Smoke tests passed ✓"

  # ── Swap staging → production ─────────────────────────────────────────────────
  swap-to-production:
    name: Swap Staging → Production (Zero-downtime)
    runs-on: ubuntu-latest
    needs: smoke-tests
    environment: production-swap

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Swap slots
        run: |
          az webapp deployment slot swap \
            --resource-group ${{ env.AZURE_RG }} \
            --name ${{ secrets.APP_SERVICE_NAME }} \
            --slot staging \
            --target-slot production

      - name: Verify production health after swap
        run: |
          URL="https://${{ secrets.APP_SERVICE_NAME }}.azurewebsites.net"
          for i in {1..15}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/api/v1/health" || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Production is healthy after swap ✓"
              exit 0
            fi
            sleep 10
          done
          echo "Production health check failed after swap — rolling back"
          az webapp deployment slot swap \
            --resource-group ${{ env.AZURE_RG }} \
            --name ${{ secrets.APP_SERVICE_NAME }} \
            --slot staging \
            --target-slot production
          exit 1

  # ── Deploy frontend to Static Web Apps ───────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (Static Web Apps)
    runs-on: ubuntu-latest
    needs: ci
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install deps
        run: npm ci --workspaces --if-present

      - name: Build frontend
        working-directory: packages/frontend
        run: npm run build
        env:
          VITE_API_URL: /api/v1

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: 'packages/frontend'
          output_location: 'dist'
          skip_app_build: true   # We already built above
